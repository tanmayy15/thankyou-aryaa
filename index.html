<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>❤️</title>
  <style>
    body{
      margin:0;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:linear-gradient(135deg,#ffd6e7,#dff6ff);
      font-family:Arial,sans-serif;
      overflow:hidden;
    }
    h1{
      font-size:3rem;
      color:#333;
      text-align:center;
      animation:fadeIn 1.5s ease;
    }
    @keyframes fadeIn{
      from{opacity:0;transform:scale(.8);}
      to{opacity:1;transform:scale(1);}
    }
  </style>
</head>
<body>
  <h1>Thankyou Aryaa 🫠🫂</h1>
</body>
</html>
